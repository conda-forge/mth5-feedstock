{% set name = "mth5" %}
{% set version = "0.6.5" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mth5-{{ version }}.tar.gz
  sha256: 0ae1f956a20d9488e1523048b79ff7c53d1b6af2d3558e2e1d02db0164ec161e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip

  run:
    - python {{ python_min }}.*
    - setuptools <70
    - h5py
    - matplotlib-base
    - numpy
    - obspy
    - pandas
    - pyyaml
    - scipy
    - xarray
    - mt-metadata >=1.0.0
    - email-validator
    - loguru

test:
  imports:
    - mth5
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip
    - setuptools <70

about:
  home: https://github.com/kujaku11/mth5
  summary: Archivable and exchangeable format for magnetotelluric data
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - kujaku11
    - kkappler
    - lheagy
